services:
  postgres:
    image: postgres:16
    container_name: pg
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: expensedb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d expensedb"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
